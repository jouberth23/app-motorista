<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1E3A8A" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>

  <!-- Car body -->
  <rect x="72" y="262" width="368" height="140" rx="32" fill="white" filter="url(#shadow)"/>

  <!-- Car cabin -->
  <path d="M140 262 L164 174 Q178 148 208 148 H304 Q334 148 348 174 L372 262 Z"
        fill="white" filter="url(#shadow)"/>

  <!-- Windows -->
  <path d="M178 252 L196 184 Q204 170 218 170 H294 Q308 170 316 184 L334 252 Z"
        fill="#1E40AF" fill-opacity="0.5"/>

  <!-- Window divider -->
  <line x1="256" y1="170" x2="256" y2="252" stroke="white" stroke-width="7" stroke-opacity="0.3"/>

  <!-- Door line -->
  <line x1="256" y1="263" x2="256" y2="396" stroke="#3B82F6" stroke-width="6" stroke-opacity="0.25"/>

  <!-- Wheel left -->
  <circle cx="152" cy="400" r="54" fill="#0F172A"/>
  <circle cx="152" cy="400" r="26" fill="#93C5FD"/>
  <circle cx="152" cy="400" r="10" fill="#DBEAFE"/>

  <!-- Wheel right -->
  <circle cx="360" cy="400" r="54" fill="#0F172A"/>
  <circle cx="360" cy="400" r="26" fill="#93C5FD"/>
  <circle cx="360" cy="400" r="10" fill="#DBEAFE"/>

  <!-- Headlights -->
  <rect x="400" y="298" width="40" height="24" rx="8" fill="#FCD34D" fill-opacity="0.9"/>
  <rect x="72" y="298" width="32" height="24" rx="8" fill="#EF4444" fill-opacity="0.85"/>

  <!-- Taxi stripe -->
  <rect x="72" y="336" width="368" height="13" fill="#FBBF24" fill-opacity="0.2" rx="4"/>
</svg>
