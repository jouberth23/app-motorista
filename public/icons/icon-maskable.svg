<!-- Maskable icon: safe zone is inner 80% (51.2px padding each side in 512px canvas) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background (maskable icons fill the entire canvas) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="256" fill="url(#shine)"/>

  <!-- Content within safe zone (10% padding = ~51px each side, so content from 51–461) -->
  <!-- Car body -->
  <rect x="100" y="292" width="312" height="118" rx="26" fill="white"/>

  <!-- Car cabin -->
  <path d="M155 292 L174 212 Q184 194 204 194 H308 Q328 194 338 212 L357 292 Z"
        fill="white"/>

  <!-- Windows -->
  <path d="M188 280 L203 218 Q210 206 222 206 H290 Q302 206 309 218 L324 280 Z"
        fill="#1E40AF" fill-opacity="0.5"/>

  <!-- Window divider -->
  <line x1="256" y1="206" x2="256" y2="280" stroke="white" stroke-width="6" stroke-opacity="0.3"/>

  <!-- Door line -->
  <line x1="256" y1="293" x2="256" y2="405" stroke="#3B82F6" stroke-width="5" stroke-opacity="0.25"/>

  <!-- Wheel left -->
  <circle cx="168" cy="410" r="44" fill="#0F172A"/>
  <circle cx="168" cy="410" r="20" fill="#93C5FD"/>
  <circle cx="168" cy="410" r="8" fill="#DBEAFE"/>

  <!-- Wheel right -->
  <circle cx="344" cy="410" r="44" fill="#0F172A"/>
  <circle cx="344" cy="410" r="20" fill="#93C5FD"/>
  <circle cx="344" cy="410" r="8" fill="#DBEAFE"/>

  <!-- Headlights -->
  <rect x="378" y="316" width="34" height="20" rx="6" fill="#FCD34D" fill-opacity="0.9"/>
  <rect x="100" y="316" width="27" height="20" rx="6" fill="#EF4444" fill-opacity="0.85"/>
</svg>
