<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7.5" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="32" height="16" rx="7.5" fill="url(#shine)"/>

  <!-- Car body -->
  <rect x="4.5" y="16" width="23" height="8.5" rx="2" fill="white"/>

  <!-- Car cabin/roof -->
  <path d="M9 16 L10.5 11 Q11.5 9.5 13.5 9.5 H18.5 Q20.5 9.5 21.5 11 L23 16 Z" fill="white"/>

  <!-- Windows (blue tinted) -->
  <path d="M11.5 15 L12.5 11.8 Q13 11 14 11 H18 Q19 11 19.5 11.8 L20.5 15 Z"
        fill="#1E40AF" fill-opacity="0.55"/>

  <!-- Window divider -->
  <line x1="16" y1="11" x2="16" y2="15" stroke="white" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Wheel left -->
  <circle cx="9.5" cy="24.5" r="3.2" fill="#0F172A"/>
  <circle cx="9.5" cy="24.5" r="1.4" fill="#93C5FD"/>

  <!-- Wheel right -->
  <circle cx="22.5" cy="24.5" r="3.2" fill="#0F172A"/>
  <circle cx="22.5" cy="24.5" r="1.4" fill="#93C5FD"/>

  <!-- Door line -->
  <line x1="16" y1="16.5" x2="16" y2="24.2" stroke="#2563EB" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- Headlights -->
  <rect x="24.5" y="18.5" width="2.5" height="1.5" rx="0.5" fill="#FCD34D" fill-opacity="0.9"/>
  <!-- Tail lights -->
  <rect x="5" y="18.5" width="2" height="1.5" rx="0.5" fill="#EF4444" fill-opacity="0.8"/>
</svg>
