<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="60%" stop-color="#0D1426"/>
      <stop offset="100%" stop-color="#0A0E1B"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="45%" r="45%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="60%" r="40%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1E2C50" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#2563EB" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#6B7280" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
  </g>

  <!-- Top accent bar -->
  <rect width="1200" height="5" fill="#2563EB"/>
  <rect width="1200" height="5" fill="url(#iconGrad)"/>

  <!-- Bottom accent -->
  <rect y="625" width="1200" height="5" fill="#1E40AF" fill-opacity="0.6"/>

  <!-- Left decorative circle (large, faint) -->
  <circle cx="80" cy="315" r="260" stroke="#2563EB" stroke-width="1" stroke-opacity="0.08" fill="none"/>
  <circle cx="80" cy="315" r="200" stroke="#2563EB" stroke-width="1" stroke-opacity="0.06" fill="none"/>

  <!-- Icon container -->
  <rect x="80" y="195" width="120" height="120" rx="28" fill="url(#iconGrad)" filter="url(#shadow)"/>
  <!-- Inner shine -->
  <rect x="80" y="195" width="120" height="60" rx="28" fill="white" fill-opacity="0.08"/>

  <!-- Car icon (scaled for 120x120 box, centered at 140,255) -->
  <g transform="translate(90, 208) scale(3.1)">
    <!-- Car body -->
    <rect x="1.5" y="14" width="23" height="8.5" rx="2" fill="white"/>
    <!-- Car roof -->
    <path d="M5 14 L6.5 9 Q7.5 7.5 9.5 7.5 H16.5 Q18.5 7.5 19.5 9 L21 14 Z" fill="white"/>
    <!-- Windows -->
    <path d="M7.5 13 L8.5 9.8 Q9 9 10 9 H16 Q17 9 17.5 9.8 L18.5 13 Z"
          fill="#1E40AF" fill-opacity="0.5"/>
    <!-- Window divider -->
    <line x1="13" y1="9" x2="13" y2="13" stroke="white" stroke-width="0.5" stroke-opacity="0.4"/>
    <!-- Wheel left -->
    <circle cx="7" cy="22.5" r="3" fill="#0F172A"/>
    <circle cx="7" cy="22.5" r="1.3" fill="#93C5FD"/>
    <!-- Wheel right -->
    <circle cx="19" cy="22.5" r="3" fill="#0F172A"/>
    <circle cx="19" cy="22.5" r="1.3" fill="#93C5FD"/>
    <!-- Headlights -->
    <rect x="22.5" y="16.5" width="2" height="1.2" rx="0.4" fill="#FCD34D" fill-opacity="0.9"/>
    <rect x="1.5" y="16.5" width="1.8" height="1.2" rx="0.4" fill="#EF4444" fill-opacity="0.8"/>
  </g>

  <!-- Main title -->
  <text x="230" y="280" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="82" font-weight="700" fill="white" letter-spacing="-2">TaxiVoucher</text>

  <!-- Tagline -->
  <text x="232" y="338" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="30" font-weight="400" fill="#64748B">
    Sistema Corporativo de Gestão de Viagens
  </text>

  <!-- Feature badges -->
  <!-- Badge 1 -->
  <rect x="232" y="380" width="190" height="42" rx="10" fill="#1E2844" fill-opacity="0.8"
        stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="327" y="408" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="500" fill="#93C5FD" text-anchor="middle">Controle de Viagens</text>

  <!-- Badge 2 -->
  <rect x="438" y="380" width="190" height="42" rx="10" fill="#1E2844" fill-opacity="0.8"
        stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="533" y="408" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="500" fill="#93C5FD" text-anchor="middle">Aprovação Digital</text>

  <!-- Badge 3 -->
  <rect x="644" y="380" width="190" height="42" rx="10" fill="#1E2844" fill-opacity="0.8"
        stroke="#2563EB" stroke-width="1" stroke-opacity="0.4"/>
  <text x="739" y="408" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="18" font-weight="500" fill="#93C5FD" text-anchor="middle">Relatórios em PDF</text>

  <!-- Divider line -->
  <line x1="80" y1="468" x2="760" y2="468" stroke="#1E3A8A" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Bottom branding -->
  <text x="230" y="500" font-family="'Segoe UI', system-ui, sans-serif"
        font-size="20" fill="#334155">
    Registro de KM · Assinatura Digital · Auditoria Completa
  </text>

  <!-- Right decorative: dashboard mockup card -->
  <rect x="840" y="80" width="300" height="470" rx="20" fill="url(#cardGrad)"
        stroke="#2563EB" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Card top bar -->
  <rect x="840" y="80" width="300" height="50" rx="20" fill="#1E3A8A" fill-opacity="0.6"/>
  <rect x="840" y="100" width="300" height="30" fill="#1E3A8A" fill-opacity="0.6"/>
  <circle cx="866" cy="106" r="8" fill="#2563EB" fill-opacity="0.8"/>
  <rect x="882" y="100" width="90" height="8" rx="4" fill="white" fill-opacity="0.7"/>
  <rect x="882" y="113" width="60" height="6" rx="3" fill="white" fill-opacity="0.25"/>

  <!-- Stat mini cards -->
  <rect x="856" y="148" width="118" height="64" rx="10" fill="#0F1B36" fill-opacity="0.8"/>
  <rect x="986" y="148" width="118" height="64" rx="10" fill="#0F1B36" fill-opacity="0.8"/>
  <rect x="856" y="224" width="118" height="64" rx="10" fill="#0F1B36" fill-opacity="0.8"/>
  <rect x="986" y="224" width="118" height="64" rx="10" fill="#0F1B36" fill-opacity="0.8"/>

  <!-- Stat values -->
  <text x="915" y="178" font-family="sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle">124</text>
  <text x="915" y="196" font-family="sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Viagens</text>
  <text x="1045" y="178" font-family="sans-serif" font-size="22" font-weight="700" fill="#34D399" text-anchor="middle">R$ 8.4k</text>
  <text x="1045" y="196" font-family="sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Total Mês</text>
  <text x="915" y="254" font-family="sans-serif" font-size="22" font-weight="700" fill="#60A5FA" text-anchor="middle">12</text>
  <text x="915" y="272" font-family="sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Pendentes</text>
  <text x="1045" y="254" font-family="sans-serif" font-size="22" font-weight="700" fill="#FBBF24" text-anchor="middle">5</text>
  <text x="1045" y="272" font-family="sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Motoristas</text>

  <!-- Trip list rows -->
  <rect x="856" y="304" width="248" height="1" fill="#1E3A8A"/>
  <rect x="856" y="316" width="248" height="26" rx="6" fill="#0F1B36" fill-opacity="0.5"/>
  <circle cx="872" cy="329" r="6" fill="#34D399" fill-opacity="0.3"/>
  <rect x="886" y="322" width="80" height="6" rx="3" fill="white" fill-opacity="0.5"/>
  <rect x="886" y="332" width="55" height="5" rx="2.5" fill="#64748B" fill-opacity="0.6"/>
  <rect x="1060" y="322" width="40" height="14" rx="5" fill="#059669" fill-opacity="0.3"/>
  <text x="1080" y="333" font-family="sans-serif" font-size="8" fill="#34D399" text-anchor="middle">OK</text>

  <rect x="856" y="350" width="248" height="26" rx="6" fill="#0F1B36" fill-opacity="0.5"/>
  <circle cx="872" cy="363" r="6" fill="#FBBF24" fill-opacity="0.3"/>
  <rect x="886" y="356" width="72" height="6" rx="3" fill="white" fill-opacity="0.5"/>
  <rect x="886" y="366" width="45" height="5" rx="2.5" fill="#64748B" fill-opacity="0.6"/>
  <rect x="1052" y="356" width="52" height="14" rx="5" fill="#92400E" fill-opacity="0.3"/>
  <text x="1078" y="367" font-family="sans-serif" font-size="8" fill="#FBBF24" text-anchor="middle">Pendente</text>

  <rect x="856" y="384" width="248" height="26" rx="6" fill="#0F1B36" fill-opacity="0.5"/>
  <circle cx="872" cy="397" r="6" fill="#60A5FA" fill-opacity="0.3"/>
  <rect x="886" y="390" width="88" height="6" rx="3" fill="white" fill-opacity="0.5"/>
  <rect x="886" y="400" width="50" height="5" rx="2.5" fill="#64748B" fill-opacity="0.6"/>
  <rect x="1055" y="390" width="48" height="14" rx="5" fill="#1E3A8A" fill-opacity="0.5"/>
  <text x="1079" y="401" font-family="sans-serif" font-size="8" fill="#60A5FA" text-anchor="middle">Enviado</text>

  <!-- Bottom of mockup card -->
  <rect x="856" y="428" width="248" height="1" fill="#1E3A8A" fill-opacity="0.5"/>
  <rect x="856" y="440" width="100" height="8" rx="4" fill="#1E3A8A" fill-opacity="0.6"/>
  <rect x="964" y="440" width="60" height="8" rx="4" fill="#2563EB" fill-opacity="0.7"/>

  <!-- Corner decorations -->
  <circle cx="1160" cy="80" r="120" stroke="#1E3A8A" stroke-width="1" stroke-opacity="0.15" fill="none"/>
  <circle cx="1160" cy="80" r="80" stroke="#1E3A8A" stroke-width="1" stroke-opacity="0.12" fill="none"/>
</svg>
